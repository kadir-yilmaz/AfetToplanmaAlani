name: Release Electron app

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          dotnet tool install ElectronNET.CLI -g
          dotnet tool install Microsoft.Web.LibraryManager.Cli -g
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^v', ''
          }
          # 'v' karakterini temizle (eğer elle v1.0.0 yazılırsa)
          $version = $version -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Restore Front-end Libraries
        run: |
          cd AfetToplanmaAlani.WebUI
          & "$env:USERPROFILE\.dotnet\tools\libman.exe" restore

      - name: Patch manifest version
        shell: pwsh
        run: |
          $manifestPath = "AfetToplanmaAlani.WebUI/electron.manifest.json"
          $manifest = Get-Content $manifestPath | ConvertFrom-Json
          $manifest.build.buildVersion = "${{ steps.get_version.outputs.VERSION }}"
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath

      - name: Patch appsettings version
        shell: pwsh
        run: |
          $settingsPath = "AfetToplanmaAlani.WebUI/appsettings.json"
          $settings = Get-Content $settingsPath | ConvertFrom-Json
          $settings.Version = "${{ steps.get_version.outputs.VERSION }}"
          $settings | ConvertTo-Json -Depth 10 | Set-Content $settingsPath

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build Electron app
        shell: pwsh
        run: |
          cd AfetToplanmaAlani.WebUI
          & "$env:USERPROFILE\.dotnet\tools\electronize.exe" build /target win /publish-ready-to-run true

      - name: Package ZIP
        shell: pwsh
        run: |
          # Use the predictable output path set in electron.manifest.json
          $distPath = "dist/win-unpacked"
          if (Test-Path $distPath) {
              echo "Found build at $distPath"
              Compress-Archive -Path "$distPath\*" -DestinationPath "AfetToplanmaAlani-v${{ steps.get_version.outputs.VERSION }}-win.zip"
          } else {
              echo "Error: Output directory $distPath not found. Checking broad search..."
              $unpackedDir = Get-ChildItem -Path "." -Recurse -Filter "win-unpacked" -Directory | Select-Object -First 1
              if ($unpackedDir) {
                  Compress-Archive -Path "$($unpackedDir.FullName)\*" -DestinationPath "AfetToplanmaAlani-v${{ steps.get_version.outputs.VERSION }}-win.zip"
              } else {
                  exit 1
              }
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
